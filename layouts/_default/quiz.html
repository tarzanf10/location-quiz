{{- define "main" -}}
<div id="question"></div>
<div id="map-container"></div>
<div id="options"></div>
<script>
let mapInstance = null;

fetch('./questions.json')
  .then(response => {
    if (!response.ok) throw new Error('Failed to load questions');
    return response.json();
  })
  .then(questions => {
    const qMap = {};
    questions.forEach(q => qMap[q.id] = q);
    
    function showHome() {
      document.getElementById('question').innerHTML = '<h1>Location Quiz</h1><p>Test your geography knowledge!</p>';
      document.getElementById('map-container').innerHTML = '';
      document.getElementById('options').innerHTML = '<button class="start-btn" onclick="window.location.hash = \'#q1\'">Start Quiz</button>';
    }
    
    function showReward(qid) {
      const q = qMap[qid];
      if (!q || !q.reward) return;
      
      const rewardHTML = `
        <h2>Correct! 🎉</h2>
        <div style="background-color: #e7f3ff; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #007bff;">
          <h3 style="margin-top: 0; color: #0056b3;">${q.reward.title}</h3>
          <p>${q.reward.description}</p>
          <p style="color: #666; font-weight: bold;">📍 ${q.reward.address}</p>
          <div class="coordinates">Latitude: ${q.reward.lat}<br>Longitude: ${q.reward.lng}</div>
        </div>
      `;
      document.getElementById('question').innerHTML = rewardHTML;
      
      // Create map
      document.getElementById('map-container').innerHTML = '<div id="map"></div>';
      
      // Initialize map after a short delay to ensure DOM is ready
      setTimeout(() => {
        if (mapInstance) mapInstance.remove();
        mapInstance = L.map('map').setView([q.reward.lat, q.reward.lng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors',
          maxZoom: 19
        }).addTo(mapInstance);
        L.marker([q.reward.lat, q.reward.lng]).addTo(mapInstance)
          .bindPopup('<b>' + q.reward.title + '</b>').openPopup();
      }, 100);
      
      if (q.next) {
        document.getElementById('options').innerHTML = '<button onclick="window.location.hash = \'#q' + q.next + '\'">Continue to Next Question</button>';
      } else {
        document.getElementById('options').innerHTML = '<button onclick="window.location.hash = \'\'">Back to Home</button>';
      }
    }
    
    function showQuestion(id) {
      const q = qMap[id];
      if (!q) {
        document.getElementById('question').innerHTML = '<h2>Quiz Complete!</h2><p>You\'ve earned all the location rewards!</p>';
        document.getElementById('map-container').innerHTML = '';
        document.getElementById('options').innerHTML = '<button onclick="window.location.hash = \'\'">Back to Home</button>';
        return;
      }
      document.getElementById('question').innerHTML = `<h2>Question ${id}</h2><p>${q.question}</p>`;
      document.getElementById('map-container').innerHTML = '';
      if (q.type === 'multiple') {
        const opts = q.options.map((opt, i) => `<button onclick="check(${i}, ${q.correct}, ${id})">${opt}</button>`).join('');
        document.getElementById('options').innerHTML = opts;
      } else if (q.type === 'text') {
        document.getElementById('options').innerHTML = '<input type="text" id="answerInput" placeholder="Type your answer here"><button onclick="checkText(\'' + q.correctAnswer.replace(/'/g, "\\'") + '\', ' + id + ')">Submit</button>';
      }
    }
    
    window.check = function(selected, correct, qid) {
      if (selected === correct) {
        window.location.hash = `#reward${qid}`;
      } else {
        alert('Wrong answer! Try again.');
      }
    };
    
    window.checkText = function(correctAnswer, qid) {
      const userAnswer = document.getElementById('answerInput').value.trim().toLowerCase();
      if (userAnswer === correctAnswer.toLowerCase()) {
        window.location.hash = `#reward${qid}`;
      } else {
        alert('Wrong answer! Try again.');
      }
    };
    
    function parseHash() {
      const hash = window.location.hash;
      if (!hash) return { type: 'home' };
      if (hash.startsWith('#reward')) {
        const qid = parseInt(hash.slice(7));
        return { type: 'reward', qid };
      }
      if (hash.startsWith('#q')) {
        const qid = parseInt(hash.slice(2));
        return { type: 'question', qid };
      }
      return { type: 'home' };
    }
    
    function renderPage() {
      const page = parseHash();
      if (page.type === 'home') {
        showHome();
      } else if (page.type === 'question') {
        showQuestion(page.qid);
      } else if (page.type === 'reward') {
        showReward(page.qid);
      }
    }
    
    renderPage();
    
    window.onhashchange = () => {
      renderPage();
    };
  })
  .catch(error => {
    console.error('Error loading questions:', error);
    document.getElementById('question').innerHTML = '<h2>Error</h2>';
    document.getElementById('map-container').innerHTML = '';
    document.getElementById('options').innerHTML = '<p>Failed to load quiz data. Please refresh the page.</p>';
  });
</script>
{{- end -}}
