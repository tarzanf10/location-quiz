{{- define "main" -}}
<div id="question"></div>
<div id="map-container"></div>
<div id="options"></div>
<script>
let mapInstance = null;
let trailManifest = []; // [{id, name, description}]

// Get trail number from URL search params (e.g., ?trail=2)
const urlParams = new URLSearchParams(window.location.search);
const hasTrailParam = urlParams.has('trail');
const selectedTrail = parseInt(urlParams.get('trail') || '1');

// Load trails/trails.json (array of filenames), then load all trail files.
// Each trail file: { name, description, questions: [...] }
fetch('./trails/trails.json')
  .then(r => r.json())
  .catch(() => ['trail-1.json'])
  .then(files => Promise.all(
    files.map((file, i) =>
      fetch('./trails/' + file)
        .then(r => r.json())
        .then(d => ({
          id: i + 1,
          fileName: file,
          name: d.name || `Trail ${i + 1}`,
          description: d.description || '',
          start: Array.isArray(d) ? null : (d.start || null),
          questions: Array.isArray(d) ? d : (d.questions || [])
        }))
        .catch(() => ({ id: i + 1, fileName: file, name: `Trail ${i + 1}`, description: '', start: null, questions: [] }))
    )
  ))
  .then(allTrails => {
    trailManifest = allTrails.map(({ id, fileName, name, description }) => ({ id, fileName, name, description }));
    const trail = allTrails.find(t => t.id === selectedTrail) || allTrails[0];
    const questions = trail ? trail.questions : [];
    if (!questions.length) throw new Error('No questions found for this trail');
    return trail;
  })
  .then(trail => {
    const questions = trail.questions;
    const qMap = {};
    questions.forEach(q => qMap[q.id] = q);

    // Build ordered trail by following next-chain from the first question
    function buildTrailOrder() {
      const referencedIds = new Set(questions.map(q => q.next).filter(Boolean));
      const first = questions.find(q => !referencedIds.has(q.id));
      const order = [];
      let cur = first;
      while (cur) {
        order.push(cur.id);
        cur = cur.next ? qMap[cur.next] : null;
      }
      // Fall back to JSON order if chain is broken
      return order.length === questions.length ? order : questions.map(q => q.id);
    }

    const forwardOrder = buildTrailOrder();          // [Q1, Q2, Q3 ...]
    const reverseOrder = [...forwardOrder].reverse(); // [... Q3, Q2, Q1]
    const n = forwardOrder.length;

    // The reward location to show after answering question at trail index i.
    // Forward:  qMap[forwardOrder[i]].reward  (go here for next Q's answer)
    // Reverse:  qMap[forwardOrder[n - 3 - i]].reward
    //   → after reverse[0] (last Q) go to where reverse[1]'s answer is visible, etc.
    function getRewardForIndex(dir, i) {
      if (dir === 'f') {
        return qMap[forwardOrder[i]] ? qMap[forwardOrder[i]].reward : null;
      } else {
        const fi = n - 3 - i;
        return (fi >= 0 && qMap[forwardOrder[fi]]) ? qMap[forwardOrder[fi]].reward : null;
      }
    }

    function getConfiguredStartLocation(dir) {
      if (!trail.start) return null;
      if (dir === 'f') {
        return trail.start.forward || trail.start.f || trail.start.location || trail.start;
      }
      return trail.start.reverse || trail.start.r || null;
    }

    function getStartLocation(dir) {
      const configuredStart = getConfiguredStartLocation(dir);
      if (configuredStart) return configuredStart;
      if (dir === 'f') {
        return qMap[forwardOrder[n - 1]] ? qMap[forwardOrder[n - 1]].reward : null;
      }
      if (n >= 2 && qMap[forwardOrder[n - 2]]) {
        return qMap[forwardOrder[n - 2]].reward;
      }
      return qMap[forwardOrder[n - 1]] ? qMap[forwardOrder[n - 1]].reward : null;
    }

    function renderLocationMap(location) {
      document.getElementById('map-container').innerHTML = '<div id="map"></div>';
      setTimeout(() => {
        if (mapInstance) mapInstance.remove();
        mapInstance = L.map('map').setView([location.lat, location.lng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors', maxZoom: 19
        }).addTo(mapInstance);
        L.marker([location.lat, location.lng]).addTo(mapInstance)
          .bindPopup('<b>' + location.title + '</b>').openPopup();
      }, 100);
    }

    function getLocationHtml(heading, intro, location) {
      const w3w = location.w3w || location.what3words || location.what3Words;
      const w3wLine = w3w
        ? `<div style="margin-top:8px;"><strong>What3Words:</strong> <a href="https://what3words.com/${String(w3w).replace('///','')}" target="_blank" style="color:#e11f26;">${w3w}</a></div>`
        : '';
      return `
        <h2>${heading}</h2>
        <p>${intro}</p>
        <div style="background-color: #e7f3ff; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #007bff;">
          <h3 style="margin-top: 0; color: #0056b3;">${location.title}</h3>
          <p>${location.description || 'Head here to continue the trail.'}</p>
          <p style="color: #666; font-weight: bold;">📍 ${location.address}</p>
          <div class="coordinates">
            <strong>Coordinates:</strong><br>
            Latitude: ${location.lat}<br>
            Longitude: ${location.lng}<br>
            <br>
            <strong>OS Grid Reference:</strong> ${location.osGrid || '-'}
            ${w3wLine}
          </div>
        </div>`;
    }

    function showStartLocation(dir) {
      const startLocation = getStartLocation(dir);
      if (!startLocation) {
        window.location.hash = '#' + dir + 'q0';
        return;
      }
      const directionLabel = dir === 'f' ? 'forward' : 'reverse';
      document.getElementById('question').innerHTML = getLocationHtml(
        'Start here 📍',
        `Head to this location to begin the ${directionLabel} trail. Once you arrive, open the first question.`,
        startLocation
      );
      renderLocationMap(startLocation);
      document.getElementById('options').innerHTML =
        `<button onclick="window.location.hash = '#${dir}q0'">I'm at the starting location</button>` +
        `<button onclick="window.location.hash = ''" style="background:#6c757d;">Choose a different direction</button>`;
    }

    function showRewardLocation(reward, nextHash, isLast) {
      if (!reward) {
        document.getElementById('question').innerHTML = '<h2>Well done! 🏁</h2><p>Please go back to base.</p>';
        document.getElementById('map-container').innerHTML = '';
        document.getElementById('options').innerHTML = '<button onclick="window.location.hash = \'\'">Back to Base</button>';
        return;
      }
      document.getElementById('question').innerHTML = getLocationHtml(
        'Correct — here is your next stop 🎉',
        'Head to this location in town. Once you arrive, you should be able to find the answer to the next question.',
        reward
      );
      renderLocationMap(reward);
      if (isLast) {
        document.getElementById('options').innerHTML = '<button onclick="window.location.hash = \'\'">Back to Base</button>';
      } else {
        document.getElementById('options').innerHTML =
          '<button onclick="window.location.hash = \'' + nextHash + '\'">I\'m ready for the next question</button>';
      }
    }

    function showQuestion(dir, i) {
      const order = dir === 'f' ? forwardOrder : reverseOrder;
      const qid = order[i];
      const q = qMap[qid];
      if (!q) {
        document.getElementById('question').innerHTML = '<h2>Well done! 🏁</h2><p>Please go back to base.</p>';
        document.getElementById('map-container').innerHTML = '';
        document.getElementById('options').innerHTML = '<button onclick="window.location.hash = \'\'">Back to Base</button>';
        return;
      }
      const qNum = i + 1;
      document.getElementById('question').innerHTML = `<h2>Question ${qNum} of ${n}</h2><p>${q.question}</p>`;
      document.getElementById('map-container').innerHTML = '';
      if (q.type === 'multiple') {
        const opts = q.options.map((opt, j) =>
          `<button onclick="answerMultiple('${dir}',${i},${j},${q.correct})">${opt}</button>`
        ).join('');
        document.getElementById('options').innerHTML = opts;
      } else {
        document.getElementById('options').innerHTML =
          `<input type="text" id="answerInput" placeholder="Type your answer here">` +
          `<button onclick="answerText('${dir}',${i},'${q.correctAnswer.replace(/'/g, "\\'")}')">Submit</button>`;
      }
    }

    window.answerMultiple = function(dir, i, selected, correct) {
      if (selected === correct) {
        window.location.hash = '#' + dir + 'reward' + i;
      } else {
        alert('Wrong answer! Try again.');
      }
    };

    window.answerText = function(dir, i, correctAnswer) {
      const val = document.getElementById('answerInput').value.trim().toLowerCase();
      if (val === correctAnswer.toLowerCase()) {
        window.location.hash = '#' + dir + 'reward' + i;
      } else {
        alert('Wrong answer! Try again.');
      }
    };

    function showHome() {
      if (!hasTrailParam) {
        const trailCards = trailManifest.map(t => `
          <button class="start-btn" style="background:#6c757d; font-size:16px; padding:14px 20px; text-align:left; align-items:flex-start; justify-content:flex-start; flex-direction:column; gap:6px;" onclick="window.location.search='?trail=${t.id}'">
            <span style="font-weight:700; color:#fff;">${t.name}</span>
            <span style="font-size:13px; color:#e9ecef; font-weight:400;">${t.description || 'Trail ' + t.id}</span>
          </button>`
        ).join('');
        document.getElementById('question').innerHTML = `
          <div style="text-align: center; margin-bottom: 20px;">
            <h1 style="margin: 0 0 6px 0; color: #007bff; font-size: 32px;">🗺️ Location Quiz</h1>
            <p style="margin: 0; color: #666; font-size: 14px;">Choose a trail to begin</p>
          </div>
          <p style="margin: 16px 0; color: #555; font-size: 15px; line-height: 1.6;">
            Pick a trail below. On the next screen, you can choose whether to walk it forward or reverse.
          </p>
        `;
        document.getElementById('map-container').innerHTML = '';
        document.getElementById('options').innerHTML = trailCards;
        return;
      }

      // Starting location for reverse trail = reward of second-to-last forward question
      const forwardStart = getStartLocation('f');
      const reverseStart = getStartLocation('r');
      const forwardStartLabel = forwardStart
        ? `<span style="display:block; font-size:12px; color:#f8f9fa; margin:0 0 8px 0; font-weight:500;">🚶 Starts at: <strong>${forwardStart.title}</strong></span>`
        : '';
      const reverseStartLabel = reverseStart
        ? `<span style="display:block; font-size:12px; color:#f8f9fa; margin:0 0 8px 0; font-weight:500;">🚶 Starts at: <strong>${reverseStart.title}</strong></span>`
        : '';
      
      const selectedMeta = trailManifest.find(t => t.id === selectedTrail);
      const trailNav = `<div style="margin-top:16px; padding-top:16px; border-top:2px solid #dee2e6;">
                          <a href="${window.location.pathname}" style="color:#007bff; font-weight:600; text-decoration:none;">← Back to All Trails</a>
                        </div>`;
      
      document.getElementById('question').innerHTML = `
        <div style="text-align: center; margin-bottom: 20px;">
          <h1 style="margin: 0 0 6px 0; color: #007bff; font-size: 32px;">🗺️ Location Quiz</h1>
          <p style="margin: 0; color: #666; font-size: 14px;">${selectedMeta ? selectedMeta.name : 'Walk around town and answer questions'}</p>
        </div>
        <p style="margin: 16px 0; color: #555; font-size: 15px; line-height: 1.6;">
          Answer each question to find your next stop. Head to that location in town, and look around to find the answer to the next question.
        </p>
        <p style="color: #007bff; font-weight: 600; margin: 16px 0 12px 0; font-size: 14px;">Pick a direction:</p>
      `;
      document.getElementById('map-container').innerHTML = '';
      document.getElementById('options').innerHTML =
        `<button class="start-btn" onclick="window.location.hash='#fstart'" style="margin-bottom: 10px;">${forwardStartLabel}<span style="display: block; color:#fff;">▶️ Start Forward</span></button>` +
        `<button class="start-btn" onclick="window.location.hash='#rstart'" style="background: #495057; color:#fff;">${reverseStartLabel}<span style="display: block; color:#fff;">◀️ Start Reverse</span></button>` +
        trailNav;
    }

    function parseHash() {
      const h = window.location.hash;
      if (!h || h === '#') return { type: 'home' };
      const startMatch = h.match(/^#([fr])start$/);
      if (startMatch) return { type: 'start', dir: startMatch[1] };
      const m = h.match(/^#([fr])reward(\d+)$/);
      if (m) return { type: 'reward', dir: m[1], i: parseInt(m[2]) };
      const m2 = h.match(/^#([fr])q(\d+)$/);
      if (m2) return { type: 'question', dir: m2[1], i: parseInt(m2[2]) };
      return { type: 'home' };
    }

    function renderPage() {
      const page = parseHash();
      if (page.type === 'home') {
        showHome();
      } else if (page.type === 'start') {
        showStartLocation(page.dir);
      } else if (page.type === 'question') {
        showQuestion(page.dir, page.i);
      } else if (page.type === 'reward') {
        const nextI = page.i + 1;
        const order = page.dir === 'f' ? forwardOrder : reverseOrder;
        const isLast = nextI >= order.length;
        const reward = getRewardForIndex(page.dir, page.i);
        const nextHash = '#' + page.dir + 'q' + nextI;
        showRewardLocation(reward, nextHash, isLast);
      }
    }

    renderPage();
    window.onhashchange = () => renderPage();
  })
  .catch(error => {
    console.error('Error loading questions:', error);
    document.getElementById('question').innerHTML = '<h2>Error</h2>';
    document.getElementById('map-container').innerHTML = '';
    document.getElementById('options').innerHTML = '<p>Failed to load quiz data. Please refresh the page.</p>';
  });
</script>
{{- end -}}
