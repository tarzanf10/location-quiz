{{- define "main" -}}
<div style="max-width: 100%; margin: 0 auto;">
  <h1>Question Editor</h1>
  
  <!-- Navigation Tabs -->
  <div style="margin-bottom: 20px; border-bottom: 2px solid #ddd;">
    <button onclick="switchTab('create')" id="tab-create" class="tab-button active">Create Question</button>
    <button onclick="switchTab('manage')" id="tab-manage" class="tab-button">Manage Questions</button>
  </div>

  <!-- Create Question Tab -->
  <div id="tab-create-content" class="tab-content" style="display: block;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <!-- Form Section -->
      <div>
        <h3>Create New Question</h3>
        
        <label>Question Text:</label>
        <input type="text" id="questionText" placeholder="Enter question" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        
        <label>Question Type:</label>
        <select id="questionType" onchange="updateTypeFields()" style="width: 100%; padding: 8px; margin-bottom: 10px;">
          <option value="multiple">Multiple Choice</option>
          <option value="text">Free Text</option>
        </select>
        
        <div id="optionsSection">
          <label>Options (comma-separated):</label>
          <input type="text" id="questionOptions" placeholder="Option 1, Option 2, Option 3, Option 4" style="width: 100%; padding: 8px; margin-bottom: 10px;">
          
          <label>Correct Answer Index (0-based):</label>
          <input type="number" id="correctIndex" min="0" placeholder="0" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        </div>
        
        <div id="textSection" style="display: none;">
          <label>Correct Answer:</label>
          <input type="text" id="correctAnswer" placeholder="Enter correct answer" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        </div>
        
        <h3>Reward Location</h3>
        <label>Location Name:</label>
        <input type="text" id="rewardTitle" placeholder="e.g., Berkhamsted Castle" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        
        <label>Location Description:</label>
        <textarea id="rewardDescription" placeholder="Describe the location" style="width: 100%; padding: 8px; margin-bottom: 10px; height: 80px;"></textarea>
        
        <label>Address:</label>
        <input type="text" id="rewardAddress" placeholder="e.g., Berkhamsted, Hertfordshire" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        
        <label>Latitude:</label>
        <input type="number" id="rewardLat" placeholder="51.7652" step="0.0001" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        
        <label>Longitude:</label>
        <input type="number" id="rewardLng" placeholder="-0.5621" step="0.0001" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        
        <label>OS Grid Reference:</label>
        <input type="text" id="rewardOsGrid" placeholder="SP 987 079" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        
        <button onclick="addQuestion()" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Add Question</button>
      </div>

      <!-- Map Section -->
      <div>
        <h3>Pick Location on Map</h3>
        <p style="font-size: 12px; color: #666;">Click on the map to set coordinates</p>
        <div id="editor-map" style="height: 400px; border: 2px solid #007bff; border-radius: 4px; margin-bottom: 10px;"></div>
        <div style="background-color: #f0f0f0; padding: 10px; border-radius: 4px; font-size: 12px;">
          <div><strong>Selected Location:</strong></div>
          <div>Lat: <span id="mapLat">-</span></div>
          <div>Lng: <span id="mapLng">-</span></div>
          <div>OS Grid: <span id="mapOsGrid">-</span></div>
          <button onclick="useMapLocation()" style="width: 100%; margin-top: 10px; padding: 8px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Use This Location</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Manage Questions Tab -->
  <div id="tab-manage-content" class="tab-content" style="display: none;">
    <h3>Questions List</h3>
    <div id="questionsList" style="margin-bottom: 20px;"></div>
    
    <div style="display: flex; gap: 10px;">
      <button onclick="downloadJSON()" style="flex: 1; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;">📥 Download JSON</button>
      <button onclick="clearAllQuestions()" style="flex: 1; padding: 12px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;">🗑️ Clear All</button>
    </div>
  </div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
let questions = [];
let selectedLocation = null;
let editorMap = null;

// Load existing questions on page load
function initEditor() {
  fetch('../questions.json')
    .then(r => r.json())
    .then(data => {
      questions = data;
      renderQuestionsList();
    })
    .catch(e => console.error('Could not load questions:', e));
  
  // Initialize map
  setTimeout(() => {
    if (!editorMap) {
      editorMap = L.map('editor-map').setView([51.7629, -0.5631], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19
      }).addTo(editorMap);
      
      editorMap.on('click', function(e) {
        selectedLocation = e.latlng;
        document.getElementById('mapLat').textContent = e.latlng.lat.toFixed(4);
        document.getElementById('mapLng').textContent = e.latlng.lng.toFixed(4);
        document.getElementById('mapOsGrid').textContent = latLngToOsGrid(e.latlng.lat, e.latlng.lng);
        
        // Remove old marker and add new one
        editorMap.eachLayer(layer => {
          if (layer instanceof L.Marker) layer.remove();
        });
        L.marker(e.latlng).addTo(editorMap);
      });
    }
  }, 100);
}

function updateTypeFields() {
  const type = document.getElementById('questionType').value;
  document.getElementById('optionsSection').style.display = type === 'multiple' ? 'block' : 'none';
  document.getElementById('textSection').style.display = type === 'text' ? 'block' : 'none';
}

function useMapLocation() {
  if (!selectedLocation) {
    alert('Please click on the map to select a location');
    return;
  }
  document.getElementById('rewardLat').value = selectedLocation.lat.toFixed(4);
  document.getElementById('rewardLng').value = selectedLocation.lng.toFixed(4);
  document.getElementById('rewardOsGrid').value = latLngToOsGrid(selectedLocation.lat, selectedLocation.lng);
}

function latLngToOsGrid(lat, lng) {
  // Simple conversion - for accuracy, use proper library
  // This is a basic approximation
  const a = 6377563.396;
  const b = 6356256.909;
  const F0 = 0.9996012717;
  const lat0 = 49;
  const lng0 = -2;
  const N0 = -100000;
  const E0 = 400000;
  const k0 = 0.9996012717;

  const toRad = Math.PI / 180;
  const latRad = lat * toRad;
  const lngRad = lng * toRad;

  const sinLat = Math.sin(latRad);
  const cosLat = Math.cos(latRad);
  const tanLat = Math.tan(latRad);

  const n = (a - b) / (a + b);
  const v = a * F0 * Math.pow(1 - (1 - b / a) * sinLat * sinLat, -0.5);
  const rho = a * (1 - b / a) * Math.pow(1 - (1 - b / a) * sinLat * sinLat, -1.5);
  const eta2 = v / rho - 1;

  const M = b * F0 * (Math.pow(1 + n, 1) * Math.pow(1 + n / 2, 1) * Math.pow(1 + n, 1) * (1 - Math.pow(n, 2)) * (lat0 * toRad - lat * toRad));
  
  const A = cosLat * (lng - lng0) * toRad;
  const A2 = A * A;
  const A3 = A2 * A;
  const A4 = A3 * A;
  const A5 = A4 * A;
  const A6 = A5 * A;

  const E = E0 + k0 * v * (A + A3 / 6 * (1 - tanLat * tanLat + eta2) + A5 / 120 * (5 - 18 * tanLat * tanLat + Math.pow(tanLat, 4) + 72 * eta2 - 58 * Math.pow(eta2, 2)));
  const N = N0 + k0 * (M + v * tanLat * (A2 / 2 + A4 / 24 * (5 - tanLat * tanLat + 9 * eta2 + 4 * Math.pow(eta2, 2)) + A6 / 720 * (61 - 58 * tanLat * tanLat + Math.pow(tanLat, 4) + 600 * eta2 - 330 * Math.pow(eta2, 2))));

  const letters = 'ABCDEFGHJKLMNOPQRSTUVWXYZ';
  const majorSquare = Math.floor(E / 100000);
  const minorSquare = Math.floor((E % 100000) / 1000);
  const easting = Math.floor((E % 1000) / 10) % 10;
  const northing = Math.floor(N / 100000);
  const minorN = Math.floor((N % 100000) / 1000);
  const northingDigit = Math.floor((N % 1000) / 10) % 10;

  const gridLetter1 = letters[Math.floor(majorSquare / 5) % 5];
  const gridLetter2 = letters[(majorSquare % 5) + (northing % 5) * 5];

  return `${gridLetter1}${gridLetter2} ${easting}${Math.floor((E % 1000) / 100)} ${northingDigit}${Math.floor((N % 1000) / 100)}`;
}

function addQuestion() {
  const type = document.getElementById('questionType').value;
  const text = document.getElementById('questionText').value.trim();
  const title = document.getElementById('rewardTitle').value.trim();
  
  if (!text || !title) {
    alert('Please fill in question text and reward location name');
    return;
  }

  const newQ = {
    id: Math.max(...questions.map(q => q.id), 0) + 1,
    type: type,
    question: text,
    next: questions.length > 0 ? questions[questions.length - 1].id + 1 : null,
    reward: {
      title: title,
      description: document.getElementById('rewardDescription').value.trim(),
      address: document.getElementById('rewardAddress').value.trim(),
      lat: parseFloat(document.getElementById('rewardLat').value),
      lng: parseFloat(document.getElementById('rewardLng').value),
      osGrid: document.getElementById('rewardOsGrid').value.trim()
    }
  };

  if (type === 'multiple') {
    const opts = document.getElementById('questionOptions').value.split(',').map(o => o.trim());
    if (opts.length < 2) {
      alert('Please provide at least 2 options');
      return;
    }
    newQ.options = opts;
    newQ.correct = parseInt(document.getElementById('correctIndex').value);
    if (isNaN(newQ.correct) || newQ.correct >= opts.length) {
      alert('Invalid correct answer index');
      return;
    }
  } else {
    newQ.correctAnswer = document.getElementById('correctAnswer').value.trim();
    if (!newQ.correctAnswer) {
      alert('Please enter the correct answer');
      return;
    }
  }

  // Update next pointers
  if (questions.length > 0) {
    questions[questions.length - 1].next = newQ.id;
  }
  newQ.next = null;

  questions.push(newQ);
  renderQuestionsList();
  
  // Clear form
  document.getElementById('questionText').value = '';
  document.getElementById('questionOptions').value = '';
  document.getElementById('correctIndex').value = '';
  document.getElementById('correctAnswer').value = '';
  document.getElementById('rewardTitle').value = '';
  document.getElementById('rewardDescription').value = '';
  document.getElementById('rewardAddress').value = '';
  document.getElementById('rewardLat').value = '';
  document.getElementById('rewardLng').value = '';
  document.getElementById('rewardOsGrid').value = '';
  
  alert('Question added successfully!');
}

function deleteQuestion(id) {
  if (confirm('Delete this question?')) {
    questions = questions.filter(q => q.id !== id);
    renderQuestionsList();
  }
}

function renderQuestionsList() {
  const html = questions.map((q, idx) => `
    <div style="background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 4px; border-left: 4px solid #007bff;">
      <div style="display: flex; justify-content: space-between;">
        <div>
          <strong>Q${idx + 1}: ${q.question}</strong><br>
          Type: ${q.type} ${q.type === 'multiple' ? `| Options: ${q.options.join(', ')}` : ''}<br>
          Reward: ${q.reward.title} (${q.reward.osGrid})
        </div>
        <button onclick="deleteQuestion(${q.id})" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Delete</button>
      </div>
    </div>
  `).join('');
  
  document.getElementById('questionsList').innerHTML = html || '<p>No questions yet.</p>';
}

function downloadJSON() {
  if (questions.length === 0) {
    alert('No questions to download');
    return;
  }
  
  const dataStr = JSON.stringify(questions, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'questions.json';
  link.click();
  URL.revokeObjectURL(url);
}

function clearAllQuestions() {
  if (confirm('This will delete all questions. Are you sure?')) {
    questions = [];
    renderQuestionsList();
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
  
  document.getElementById('tab-' + tab + '-content').style.display = 'block';
  document.getElementById('tab-' + tab).classList.add('active');
}

// Init on load
initEditor();
</script>

<style>
.tab-button {
  padding: 10px 20px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 16px;
  font-weight: 500;
  color: #666;
  border-bottom: 3px solid transparent;
  transition: all 0.3s;
}

.tab-button.active {
  color: #007bff;
  border-bottom-color: #007bff;
}

.tab-button:hover {
  color: #0056b3;
}

.tab-content {
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

input, textarea, select {
  font-family: Arial, sans-serif;
  border: 1px solid #ddd;
  border-radius: 4px;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #007bff;
  box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
}

label {
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
  color: #333;
}

@media (max-width: 768px) {
  div[style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }
}
</style>

{{- end -}}
