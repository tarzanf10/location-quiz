<body>
    <main>
        <div id="question"></div>
<div id="options"></div>
<script>
fetch('./questions.json')
  .then(response => {
    if (!response.ok) throw new Error('Failed to load questions');
    return response.json();
  })
  .then(questions => {
    const qMap = {};
    questions.forEach(q => qMap[q.id] = q);
    
    function showHome() {
      document.getElementById('question').innerHTML = '<h1>Location Quiz</h1><p>Test your geography knowledge!</p>';
      document.getElementById('options').innerHTML = '<button class="start-btn" onclick="window.location.hash = \'#q1\'">Start Quiz</button>';
    }
    
    function showQuestion(id) {
      const q = qMap[id];
      if (!q) {
        document.getElementById('question').innerHTML = '<h2>Quiz Complete!</h2><p>Congratulations! You answered all questions correctly!</p>';
        document.getElementById('options').innerHTML = '<button onclick="window.location.hash = \'\'">Back to Home</button>';
        return;
      }
      document.getElementById('question').innerHTML = `<h2>Question ${id}</h2><p>${q.question}</p>`;
      if (q.type === 'multiple') {
        const opts = q.options.map((opt, i) => `<button onclick="check(${i}, ${q.correct}, ${q.next})">${opt}</button>`).join('');
        document.getElementById('options').innerHTML = opts;
      } else if (q.type === 'text') {
        document.getElementById('options').innerHTML = '<input type="text" id="answerInput" placeholder="Type your answer here"><button onclick="checkText(\'' + q.correctAnswer + '\', ' + q.next + ')">Submit</button>';
      }
    }
    
    window.check = function(selected, correct, next) {
      if (selected === correct) {
        if (next) {
          window.location.hash = `#q${next}`;
        } else {
          showQuestion(null);
        }
      } else {
        alert('Wrong answer! Try again.');
      }
    };
    
    window.checkText = function(correctAnswer, next) {
      const userAnswer = document.getElementById('answerInput').value.trim().toLowerCase();
      if (userAnswer === correctAnswer.toLowerCase()) {
        if (next) {
          window.location.hash = `#q${next}`;
        } else {
          showQuestion(null);
        }
      } else {
        alert('Wrong answer! Try again.');
      }
    };
    
    function getQidFromHash() {
      const hash = window.location.hash;
      return hash ? parseInt(hash.slice(2)) : null;
    }
    
    function renderPage() {
      const qid = getQidFromHash();
      if (qid === null) {
        showHome();
      } else {
        showQuestion(qid);
      }
    }
    
    renderPage();
    
    window.onhashchange = () => {
      renderPage();
    };
  })
  .catch(error => {
    console.error('Error loading questions:', error);
    document.getElementById('question').innerHTML = '<h2>Error</h2>';
    document.getElementById('options').innerHTML = '<p>Failed to load quiz data. Please refresh the page.</p>';
  });
</script>
    </main>
</body>
